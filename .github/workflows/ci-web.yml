name: CI - Web

# Note: Path filters intentionally removed to ensure workflows run on ALL pushes.
# This prevents missing checks for root-level config changes (eslint.config.js,
# tsconfig.json, package.json, etc.) that affect all packages. The extra CI time
# is negligible (~3 min/push) and well within free tier limits for solo development.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run tsc --filter=web
      - run: pnpm turbo run lint --filter=web
      - run: pnpm turbo run build --filter=web

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter=web
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/dist
